version: '3.8'

services:
  web-backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - PYTHON_ML_URL=http://ml-service:8000
      # If using postgres in production, database url goes here:
      # - DATABASE_URL=postgres://user:password@db-host:5432/dbname
    depends_on:
      - ml-service
    restart: always

  ml-service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    restart: always
